services:
  openclaw-gateway:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        OPENCLAW_INSTALL_BROWSER: 1
    environment:
      HOME: /home/node
      TERM: xterm-256color
    volumes:
      - /docker/clawdbot/config:/home/node/.openclaw
      - /docker/clawdbot/workspace:/home/node/openclaw/workspace
    init: true
    restart: unless-stopped
    command:
      [
        "node",
        "dist/index.js",
        "gateway",
        "--bind",
        "${OPENCLAW_GATEWAY_BIND:-lan}",
        "--port",
        "18789",
        "--allow-unconfigured",
      ]
    labels:
      - traefik.enable=true
      - traefik.http.routers.clawdbot.rule=Host(`clawdbot.tenawalcott.com`)
      - traefik.http.routers.clawdbot.entrypoints=websecure
      - treafik.http.routers.clawdbot.service=clawdbot
      - traefik.http.services.clawdbot.loadbalancer.server.port=18789
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:18789/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    labels:
      - traefik.enable=true
      - traefik.http.routers.clawdbot.rule=Host(`clawdbot.tenawalcott.com`)
      - traefik.http.routers.clawdbot.entrypoints=websecure
      - treafik.http.routers.clawdbot.service=clawdbot
      - traefik.http.services.clawdbot.loadbalancer.server.port=18789
